<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Đơn Hàng - Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #fbb03b; 
            --bg-light-green: #eef7e6; 
            --bg-light-yellow: #fef5c4; 
            --text-dark: #333333;
            --border-color: #ddd;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Nunito', sans-serif; }
        body { background-color: #f4f4f4; color: var(--text-dark); }
        .container { max-width: 1100px; margin: 0 auto; background-color: #ffffff; box-shadow: 0 0 10px rgba(0,0,0,0.1); padding-bottom: 20px; }
        a { text-decoration: none; color: inherit; }
        ul { list-style: none; }

        /* --- TOP BAR & HEADER --- */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 5px 20px; font-size: 13px; border-bottom: 1px solid var(--border-color); }
        .social-icons i { margin-left: 10px; font-size: 16px; cursor: pointer; color: #555;}
        
        .header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; }
        .logo img { height: 60px; }
        .admin-profile { display: flex; align-items: center; }
        .btn-profile { 
            background-color: var(--primary-color); 
            border: none; 
            padding: 8px 20px; 
            border-radius: 20px; 
            font-weight: 800; 
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* --- NAVBAR ADMIN --- */
        .admin-navbar-wrapper { padding: 0 20px; margin-bottom: 30px; }
        .admin-navbar { 
            background-color: var(--primary-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 12px 20px; 
            border-radius: 20px;
        }
        .admin-navbar ul { display: flex; gap: 50px; font-weight: 800; text-transform: uppercase; font-size: 14px; }
        .admin-navbar ul li a { transition: 0.3s ease; }
        .admin-navbar ul li a:hover, .admin-navbar ul li a.active { color: #fff; }

        .admin-content { padding: 0 40px 50px; }

        /* Tiêu đề trang */
        .page-title { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
        .page-title i { font-size: 36px; color: var(--text-dark); }
        .page-title h2 { font-size: 24px; font-weight: 900; text-transform: uppercase; }

        /* Thanh Tìm kiếm và Lọc */
        .filter-section { display: flex; gap: 20px; margin-bottom: 30px; }
        .search-box, .filter-box {
            flex: 1;
            background-color: var(--bg-light-yellow);
            border-radius: 25px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .search-box input, .filter-box select {
            flex: 1; border: none; background: transparent; outline: none;
            font-size: 15px; font-weight: 600; color: var(--text-dark);
        }
        .filter-box select { appearance: none; cursor: pointer; }

        /* Badge Trạng thái CSS MỚI ĐỂ HIỂN THỊ MÀU */
        .status-badge {
            display: inline-block; padding: 6px 12px; border-radius: 20px;
            font-weight: 800; font-size: 12px; min-width: 100px;
        }
        .status-pending { background-color: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .status-delivering { background-color: #cce5ff; color: #004085; border: 1px solid #b8daff; }
        .status-completed { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }

        /* Nút Hành động */
        .action-btns { display: flex; flex-direction: column; gap: 8px; align-items: center; }
        .btn-action { border: none; padding: 6px 15px; border-radius: 15px; font-weight: 700; cursor: pointer; width: 95px; transition: 0.2s; }
        .btn-view { background-color: #e2e2e2; color: var(--text-dark); }
        .btn-approve { background-color: var(--primary-color); color: var(--text-dark); }
        .btn-success { background-color: #28a745; color: white; }
        .btn-action:hover { filter: brightness(0.9); }

        /* --- FOOTER --- */
        .footer { background-color: var(--primary-color); padding: 30px 20px 10px; margin-top: 40px; }
        .footer-content { display: grid; grid-template-columns: 1fr 2fr 1fr; gap: 20px; margin-bottom: 20px; }
        .footer-logo img { height: 60px; margin-bottom: 10px; background-color: #fff; border-radius: 50%; padding: 5px; }
        .footer-logo p { font-size: 14px; font-weight: 600; }
        .footer-contact h4, .footer-hours h4 { font-size: 18px; margin-bottom: 15px; }
        .footer-contact ul li { margin-bottom: 10px; font-size: 14px; display: flex; align-items: center; gap: 10px; }
        .copyright { text-align: center; padding-top: 15px; border-top: 1px solid rgba(0,0,0,0.1); font-size: 12px; font-weight: 600; }
    
        h1{
            justify-content: center;
            font-weight: bold;
            font-size: 30px;
            display: flex;
        }

        h1 span{
            background: linear-gradient(to right, darkorange, rgb(255, 209, 152));
            -webkit-text-fill-color: transparent;
            -webkit-background-clip: text;
            margin-left: 8px;

        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-bar">
        <span>Ăn là ghiền - mua là mê</span>
        <div class="social-icons">
            <i class="fa-brands fa-facebook" style="color: #1877F2;"></i>
            <i class="fa-brands fa-tiktok" style="color: #000;"></i>
            <i class="fa-brands fa-instagram" style="color: #E4405F;"></i>
        </div>
    </div>

    <header class="header">
        <div class="logo">
            <a href="../index.html"><img src="../assets/images/fauget.png" alt="Fauget Logo"></a>
        </div>
        <div class="admin-profile">
            <button class="btn-profile" onclick="window.location.href='../index.html'">
                <i class="fa-solid fa-right-from-bracket"></i> Đăng xuất
            </button>
        </div>
    </header>

    

    <div class="admin-navbar-wrapper">
        <nav class="admin-navbar">
            <ul>
                <li><a href="admin-tongquan.html">TỔNG QUAN</a></li>
                <li><a href="admin-orders.html" class="active" style="color: #fff; text-decoration: underline; text-underline-offset: 4px;">QUẢN LÝ ĐƠN HÀNG</a></li>
                <li><a href="admin-products.html">QUẢN LÝ MÓN ĂN</a></li>
            </ul>
        </nav>
    </div>

<h1> CHÀO MỪNG TRỞ LẠI<span> ADMIN</span></h1>

    <footer class="footer">
        <div class="footer-content">
            <div class="footer-logo">
                <img src="../assets/images/fauget.png" alt="Fauget Logo">
                <p>Đồ ăn nhanh chất lượng, giao hàng tận nơi.</p>
            </div>
            <div class="footer-contact">
                <h4>Liên hệ</h4>
                <ul>
                    <li><i class="fa-solid fa-location-dot" style="color: #da291c;"></i> 123 Đường ABC, Hà Đông, TP.Hà Nội</li>
                    <li><i class="fa-solid fa-phone"></i> 0123 456 789</li>
                </ul>
            </div>
            <div class="footer-hours">
                <h4>Giờ mở cửa</h4>
                <p>Thứ 2 - Chủ nhật</p>
                <p>8:00 - 22:00</p>
            </div>
        </div>
        <div class="copyright">
            © 2026 Fauget. All rights reserved.
        </div>
    </footer>
</div>
</body>
</html>
